# Hack Heroes — nginx config.
# Serves the static site AND acts as the gateway/reverse-proxy to the
# self-hosted Supabase services, so the browser only ever talks to one
# origin (this server). supabase-js is configured with this same origin.
#
# Upstream service names (auth/rest/realtime) are resolved LAZILY via
# Docker's embedded DNS (127.0.0.11) using variables, so the site
# container still starts fine on its own when those services aren't
# running (e.g. plain `docker run` without the full compose stack).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Docker's embedded DNS; valid keeps resolutions fresh.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ---------- Supabase gateway routes ----------
    # GoTrue (auth): /auth/v1/* -> auth:9999/*
    location /auth/v1/ {
        set $hh_auth "http://auth:9999";
        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass $hh_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PostgREST (rest): /rest/v1/* -> rest:3000/*
    location /rest/v1/ {
        set $hh_rest "http://rest:3000";
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass $hh_rest;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_hide_header Content-Location;
    }

    # Realtime (websocket): /realtime/v1/* -> realtime:4000/socket/*
    location /realtime/v1/ {
        set $hh_rt "http://realtime:4000";
        rewrite ^/realtime/v1/(.*)$ /socket/$1 break;
        proxy_pass $hh_rt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Static site ----------

    # Don't cache HTML or the runtime config so updates show immediately.
    location ~* \.(?:html)$ {
        add_header Cache-Control "no-cache";
    }
    location = /config/supabase.json {
        add_header Cache-Control "no-cache";
    }
    location = /config/challenges.json {
        add_header Cache-Control "no-cache";
    }

    # Cache vendored/static assets for a week.
    location ~* \.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|mjs)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve the file if it exists, otherwise the project 404 page.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
}
