# Hack Heroes — all-in-one nginx gateway.
# Backends run in THIS container, so upstreams are 127.0.0.1.
# No /realtime route: this image has no Realtime service; the dashboard uses a
# polling fallback for live updates.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # GoTrue (auth): /auth/v1/* -> 127.0.0.1:9999/*
    location /auth/v1/ {
        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9999;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PostgREST (rest): /rest/v1/* -> 127.0.0.1:3000/*
    location /rest/v1/ {
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_hide_header Content-Location;
    }

    # ---------- static site ----------
    location ~* \.(?:html)$            { add_header Cache-Control "no-cache"; }
    location = /config/supabase.json   { add_header Cache-Control "no-cache"; }
    location = /config/challenges.json { add_header Cache-Control "no-cache"; }
    location ~* \.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|mjs)$ {
        expires 7d; add_header Cache-Control "public";
    }
    location / { try_files $uri $uri/ =404; }
    error_page 404 /404.html;
    location = /404.html { internal; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
}
