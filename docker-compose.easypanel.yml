# =====================================================================
# Hack Heroes — Easypanel "Compose" deployment (PASTE-READY)
# Domain: heroes.beonflow.de   (served via Easypanel's Traefik + auto-SSL)
#
# HOW TO USE IN EASYPANEL
#   1. Project -> + Service -> Compose.
#   2. Paste THIS ENTIRE FILE into the "Content" field. (You do NOT point it
#      at the repo — Compose services run the pasted YAML directly and cannot
#      read repo files, which is why everything here is self-contained:
#      images come from ghcr.io, and the two setup scripts are inlined.)
#   3. Deploy.
#   4. Open the service -> Domains tab -> add:
#         Host: heroes.beonflow.de   Service: site   Port: 8080   HTTPS: on
#      Traefik then routes https://heroes.beonflow.de -> site:8080.
#
# The browser only ever talks to https://heroes.beonflow.de. nginx inside the
# `site` image reverse-proxies /auth/v1, /rest/v1, /realtime/v1 to the backend
# services on the internal network.
#
# Images (public, on GitHub Container Registry):
#   ghcr.io/oldjoba/hackheroes-site:latest  -> nginx + app + prod config baked in
#   ghcr.io/oldjoba/hackheroes-db:latest    -> supabase/postgres + schema baked in
#
# SECURITY: the secrets below are shared dev/demo values (also in the public
# repo). Fine for a classroom demo behind RLS. To harden, regenerate
# JWT_SECRET + the matching anon/service JWTs + POSTGRES_PASSWORD everywhere.
# =====================================================================

services:

  db:
    image: ghcr.io/oldjoba/hackheroes-db:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: hackheroes-dev-postgres-pw
      POSTGRES_PORT: "5432"
      JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      JWT_EXP: "3600"
    volumes:
      - hh-db-data:/var/lib/postgresql/data

  # One-shot: give the Supabase service roles a password (they ship password-
  # less). Must run as supabase_admin — the only superuser on this image.
  db-setup:
    image: ghcr.io/oldjoba/hackheroes-db:latest
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: hackheroes-dev-postgres-pw
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "[db-setup] aligning Supabase service-role passwords…"
        psql -v ON_ERROR_STOP=1 -U supabase_admin -h db -d postgres <<'SQL'
        alter role supabase_auth_admin  with login password 'hackheroes-dev-postgres-pw';
        alter role authenticator        with login password 'hackheroes-dev-postgres-pw';
        alter role supabase_admin       with login password 'hackheroes-dev-postgres-pw';
        do $$$$
        begin
          if exists (select 1 from pg_roles where rolname='supabase_storage_admin') then
            execute 'alter role supabase_storage_admin with login password ''hackheroes-dev-postgres-pw''';
          end if;
          if exists (select 1 from pg_roles where rolname='supabase_realtime_admin') then
            execute 'alter role supabase_realtime_admin with login password ''hackheroes-dev-postgres-pw''';
          end if;
        end
        $$$$;
        SQL
        echo "[db-setup] done."

  auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: https://heroes.beonflow.de
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:hackheroes-dev-postgres-pw@db:5432/postgres?search_path=auth&sslmode=disable
      GOTRUE_SITE_URL: https://heroes.beonflow.de
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@beonflow.de
      GOTRUE_SMTP_SENDER_NAME: Hack Heroes

  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:hackheroes-dev-postgres-pw@db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      PGRST_APP_SETTINGS_JWT_EXP: "3600"

  realtime:
    image: supabase/realtime:v2.30.23
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: hackheroes-dev-postgres-pw
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      SECRET_KEY_BASE: hackheroes-dev-realtime-secret-key-base-please-change-0000000001
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"

  # One-shot: register the Realtime tenant(s) so the leaderboard websocket
  # resolves regardless of how the host is parsed. Inlined (no mounted file).
  realtime-setup:
    image: alpine:3.20
    restart: "no"
    depends_on:
      - realtime
    environment:
      REALTIME_URL: http://realtime:4000
      TENANT_EXTERNAL_IDS: "heroes.beonflow.de,heroes,localhost"
      JWT_SECRET: hackheroes-super-secret-dev-jwt-secret-min-32-chars-long-0001
      ADMIN_JWT: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwiaWF0IjoxNzA0MDY3MjAwLCJleHAiOjIwMTk2NjcyMDAsInJvbGUiOiJzZXJ2aWNlX3JvbGUifQ.aNz9ykNuOLKiGMY_fszQIfiQQEcezpJHCIpVCVVBORs
      DB_HOST: db
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: hackheroes-dev-postgres-pw
    # NOTE: every shell `$` is written as `$$` so Docker Compose passes a
    # literal `$` to the container shell instead of interpolating it itself.
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        apk add --no-cache curl >/dev/null
        RT="$$REALTIME_URL"
        echo "[realtime-setup] waiting for Realtime API at $$RT …"
        i=0
        until [ "$$(curl -s -o /dev/null -w '%{http_code}' "$$RT/" 2>/dev/null)" != "000" ] || [ "$$i" -ge 60 ]; do
          i=$$((i+1)); sleep 2
        done
        register() {
          ext="$$1"
          echo "[realtime-setup] registering tenant '$$ext' …"
          code=$$(curl -s -o /tmp/rt.out -w '%{http_code}' -X POST "$$RT/api/tenants" \
            -H "Authorization: Bearer $$ADMIN_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"tenant\":{\"external_id\":\"$$ext\",\"name\":\"$$ext\",\"jwt_secret\":\"$$JWT_SECRET\",\"extensions\":[{\"type\":\"postgres_cdc_rls\",\"settings\":{\"db_host\":\"$$DB_HOST\",\"db_name\":\"$$POSTGRES_DB\",\"db_port\":\"5432\",\"db_user\":\"supabase_admin\",\"db_password\":\"$$POSTGRES_PASSWORD\",\"region\":\"us-east-1\",\"poll_interval_ms\":100,\"poll_max_changes\":100,\"poll_max_record_bytes\":1048576,\"ssl_enforced\":false,\"publication\":\"supabase_realtime\",\"slot_name\":\"supabase_realtime_replication_slot\"}}]}}")
          echo "[realtime-setup]   -> HTTP $$code"
          case "$$code" in 2*|409) return 0 ;; *) echo "[realtime-setup]   $$(cat /tmp/rt.out)"; return 0 ;; esac
        }
        echo "[realtime-setup] tenant ids: $$TENANT_EXTERNAL_IDS"
        OLDIFS="$$IFS"; IFS=','
        for ext in $$TENANT_EXTERNAL_IDS; do
          ext="$$(echo "$$ext" | tr -d ' ')"
          [ -n "$$ext" ] && register "$$ext"
        done
        IFS="$$OLDIFS"
        echo "[realtime-setup] done."

  # The web frontend. In Easypanel, map your domain to THIS service in the
  # Domains tab: Host heroes.beonflow.de -> Service site -> Port 8080.
  site:
    image: ghcr.io/oldjoba/hackheroes-site:latest
    restart: unless-stopped
    depends_on:
      - auth
      - rest
      - realtime

volumes:
  hh-db-data:
